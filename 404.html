<!DOCTYPE html>
<html lang="es-PE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Kondorflow</title>

<link rel="icon" type="image/png" href="kondorlogo1.png">

body{font-family:'Inter',system-ui,sans-serif;background:#0f0f14;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:460px}
.num{font-size:5.5rem;font-weight:700;line-height:1;background:linear-gradient(135deg,#c55fff,#7c5cfc,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
h1{font-size:1.35rem;font-weight:500;color:rgba(255,255,255,.82);margin-bottom:11px}
p{font-size:.88rem;color:rgba(255,255,255,.42);line-height:1.7;margin-bottom:30px}
a{display:inline-block;padding:12px 26px;border-radius:50px;background:linear-gradient(135deg,#c55fff,#7c5cfc);color:#fff;text-decoration:none;font-size:.86rem;font-weight:500}
a:hover{opacity:.85}
</style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o fue movida.<br>Regresa al inicio y sigue explorando.</p>
